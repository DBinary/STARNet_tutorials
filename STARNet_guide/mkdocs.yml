site_name: STARNet Documentation
repo_url: https://github.com/DBinary/STARNet
site_author: "Lei Hu, Shichen Zhang, Xuting Zhang, Yihai Luo, and others"
copyright: "Copyright &copy; 2025, AICB Lab, Westlake University"

nav:
- STARNet Installation Guide: installation_guide.md
- Tutorials:
    - Tutorial 1:
        - GRN Inference: tutorials/Tutorial_1_GRN_Inference.ipynb
    - Tutorial 2:
        - GRN Inference: tutorials/Tutorial_2_GRN_Inference.ipynb
        - Spatial Trajectory: tutorials/Tutorial_2_Spatial_Trajectory.ipynb
    - Tutorial 3:
        - GRN Inference: tutorials/Tutorial_3_GRN_Inference.ipynb
        - GWAS Analysis: tutorials/Tutorial_3_GWAS_Analysis.ipynb
    - Tutorial 4:
        - GRN Inference: tutorials/Tutorial_4_GRN_Inference.ipynb
        - Drug Response: tutorials/Tutorial_4_Drug_Response.ipynb
# - API documentation:
#     - GRN: $api/STARNet.grn
#     - Preprocessing: $api/STARNet.pp
#     - Plotting: $api/STARNet.pl
- Release Notes: Release_notes.md
- Developer Guide: Developer_guild.md
- GitHub: https://github.com/DBinary/STARNet

plugins:
  - mkdocs-jupyter:
      include_requirejs: true
      include_source: true
  - mermaid2
  - glightbox
  - plotly
  # - mkapi:
  #     config: mkapi_config.py
  #     exclude:
  #       - STARNet.external
  #       - STARNet.external.*
  #       - torch
  #       - torch.*
  #       - lightning
  #       - lightning.*
  #       - torch_geometric
  #       - torch_geometric.*

theme:
  name: material
  custom_dir: docs/overrides

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.tabs
    - navigation.sections

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      linenums: false
      linenums_style: pymdownx-inline
  - pymdownx.superfences:
      custom_fences:
        - name: plotly
          class: mkdocs-plotly
          format: !!python/name:mkdocs_plotly_plugin.fences.fence_plotly
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/tags.css
  - css/custom.css
